name: Daily Dashboard Update

on:
  schedule:
    # 21:30 UTC = 06:30 JST
    - cron: "30 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect X posts
        # X API側の制限/障害があってもダッシュボード更新自体は継続させる
        continue-on-error: true
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_TARGET_USERNAMES: ${{ secrets.X_TARGET_USERNAMES }}
        run: python collect_x.py

      - name: Collect market data
        run: python collect_market.py

      - name: Generate analysis with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python analyze.py

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        run: python deploy.py
